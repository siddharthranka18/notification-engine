<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notification Engine</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
    h1 { color: #333; }
    #notifications { margin-top: 20px; }
    .notification { background: white; padding: 15px; margin: 10px 0; 
                    border-radius: 8px; border-left: 4px solid #4CAF50; }
    .timestamp { color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Notification Engine — Live Feed</h1>
  <p id="status">Connecting...</p>
  <div id="notifications"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    
    socket.on('connect', () => {
      document.getElementById('status').textContent = 'Connected — waiting for notifications';
    });

    socket.on('notification', (data) => { //to listen io.emit
      const div = document.createElement('div');
      div.className = 'notification';
      div.innerHTML = `
        <strong>Type:</strong> ${data.type}<br>
        <strong>Recipient:</strong> ${data.recipient}<br>
        <strong>Message:</strong> ${data.message}<br>
        <span class="timestamp">${new Date().toLocaleTimeString()}</span>
      `;
      document.getElementById('notifications').prepend(div);
    });
  </script>
</body>
</html>
